{% extends 'base.html' %}
{% block content %}
<div class="admin-hero mb-4">
  <div>
    <p class="eyebrow">Admin / Category</p>
    <h2 class="text-white mb-1">Edit Category</h2>
    <p class="text-light mb-0">{{ category.get_name_display }}</p>
  </div>
  <div class="d-flex align-items-center">
    <a href="{% url 'admin_catalog' %}" class="btn btn-outline-light">Back to Catalog</a>
  </div>
</div>

<div class="admin-card">
  <div class="mb-3">
    <h5 class="mb-0" style="font-family: 'Montserrat', sans-serif; color: #2d3748;"><i class="fas fa-edit admin-icon mr-2" style="color: #ffd700;"></i>Edit Category</h5>
  </div>
  <form method="post" enctype="multipart/form-data" class="admin-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="admin-btn" style="background: linear-gradient(135deg, #ffd700, #ff6b35); color: white;">Save Changes</button>
    <a class="admin-btn ml-2" href="{% url 'admin_catalog' %}" style="background: linear-gradient(135deg, #e2e8f0, #cbd5e0); color: #2d3748;">Cancel</a>
  </form>
</div>
{% endblock %}
