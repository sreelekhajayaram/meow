{% extends 'base.html' %}
{% block content %}
<div class="admin-hero mb-4">
  <div>
    <p class="eyebrow">Confirm Delete</p>
    <h2 class="text-white mb-1">Remove {{ type }}</h2>
    <p class="text-light mb-0">{{ object }}</p>
  </div>
  <div class="d-flex align-items-center">
    <a href="{% url 'admin_catalog' %}" class="btn btn-outline-light">Back</a>
  </div>
</div>

<div class="admin-card">
  <div class="mb-3">
    <h5 class="mb-0" style="font-family: 'Montserrat', sans-serif; color: #2d3748;"><i class="fas fa-exclamation-triangle admin-icon mr-2" style="color: #e53e3e;"></i>Confirm Deletion</h5>
  </div>
  <p class="mb-4" style="font-family: 'Poppins', sans-serif; color: #4a5568;">Are you sure you want to delete this {{ type|lower }}? This action cannot be undone.</p>
  <form method="post" class="admin-form">
    {% csrf_token %}
    <button class="admin-btn" style="background: linear-gradient(135deg, #e53e3e, #c53030); color: white;">Yes, delete</button>
    <a class="admin-btn ml-2" href="{% url 'admin_catalog' %}" style="background: linear-gradient(135deg, #e2e8f0, #cbd5e0); color: #2d3748;">Cancel</a>
  </form>
</div>
{% endblock %}
