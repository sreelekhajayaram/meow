{% extends "base.html" %}

{% block title %}Contact Us - ArtOfSree{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-12 text-center mb-5">
                <h2 class="section-header">Contact Us</h2>
                <p class="text-muted">We'd love to hear from you</p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h4 class="mb-4">Send us a Message</h4>
                        <form>
                            <div class="mb-3">
                                <label for="name" class="form-label">Your Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="subject" required>
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-gold">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h4 class="mb-4">Get in Touch</h4>
                        <p><i class="fas fa-map-marker-alt me-3 text-primary"></i>123 Art Street, Creative City</p>
                        <p><i class="fas fa-phone me-3 text-primary"></i>+91 98765 43210</p>
                        <p><i class="fas fa-envelope me-3 text-primary"></i>info@artofsree.com</p>
                        <p><i class="fas fa-clock me-3 text-primary"></i>Mon - Sat: 9:00 AM - 7:00 PM</p>
                        
                        <h5 class="mt-4 mb-3">Follow Us</h5>
                        <div>
                            <a href="#" class="btn btn-outline-primary me-2"><i class="fab fa-facebook-f"></i></a>
                            <a href="#" class="btn btn-outline-danger me-2"><i class="fab fa-instagram"></i></a>
                            <a href="#" class="btn btn-outline-info me-2"><i class="fab fa-twitter"></i></a>
                            <a href="#" class="btn btn-outline-danger"><i class="fab fa-pinterest"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
